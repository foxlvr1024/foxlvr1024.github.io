<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foxlvr1024</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/loto.css">
    <link rel="icon" type="image/x-icon" href="../pics/My Computer.ico">

    
</head>
<body>
    
    <header>
        <section class="left">
            <h5>My Computer</h5>
        </section>
        <section class="right">
            <div class="btns">
                <img src="../pics/minimize.png" class="btns" id="minimize">
            </div>
            <div class="btns">
                <img src="../pics/maximise.png" class="btns" id="maximise">
            </div>
            <div class="btns right">
                <img src="../pics/close.png" class="btns" id="close">
            </div>
        </section>
    </header>
    
    <section class="main">
        <article class="banner">
            <div class="file" id="home">
                <p class="file">Home</p>
            </div>
            <div class="file" id="myprojects">
                <p class="file">MyProjects</p>
            </div>
            <div class="file" id="devlogs">
                <p class="file">Devlogs</p>
            </div>
            <div class="file" id="reviews">
                <p class="file">Reviews</p>
            </div>
            <div class="file" id="games">
                <p class="file">Games</p>
            </div>
        </article>

        <article class="middle">
            <div class="loto left">
                <div class="loto up">
                    <div class="loto result"><p class="up">1</p></div>
                    <div class="loto result"><p class="up">11</p></div>
                    <div class="loto result"><p class="up">12</p></div>
                    <div class="loto result"><p class="up">13</p></div>
                    <div class="loto result"><p class="up">14</p></div>
                    <div class="loto result"><p class="up">11</p></div>
                    <div class="loto result"><p class="up">1</p></div>
                    
                </div>
                <div class="loto down">
                    <div class="btn" id="btn1">1</div>
                    <div class="btn" id="btn2">2</div>
                    <div class="btn" id="btn3">3</div>
                    <div class="btn" id="btn4">4</div>
                    <div class="btn" id="btn5">5</div>
                    <div class="btn" id="btn6">6</div>
                    <div class="btn" id="btn7">7</div>
                    <div class="btn" id="btn8">8</div>
                    <div class="btn" id="btn9">9</div>
                    <div class="btn" id="btn10">10</div>
                    <div class="btn" id="btn11">11</div>
                    <div class="btn" id="btn12">12</div>
                    <div class="btn" id="btn13">13</div>
                    <div class="btn" id="btn14">14</div>
                    <div class="btn" id="btn15">15</div>
                    <div class="btn" id="btn16">16</div>
                    <div class="btn" id="btn17">17</div>
                    <div class="btn" id="btn18">18</div>
                    <div class="btn" id="btn19">19</div>
                    <div class="btn" id="btn20">20</div>
                    <div class="btn" id="btn21">21</div>
                    <div class="btn" id="btn22">22</div>
                    <div class="btn" id="btn23">23</div>
                    <div class="btn" id="btn24">24</div>
                    <div class="btn" id="btn25">25</div>
                    <div class="btn" id="btn26">26</div>
                    <div class="btn" id="btn27">27</div>
                    <div class="btn" id="btn28">28</div>
                    <div class="btn" id="btn29">29</div>
                    <div class="btn" id="btn30">30</div>
                    <div class="btn" id="btn31">31</div>
                    <div class="btn" id="btn32">32</div>
                    <div class="btn" id="btn33">33</div>
                    <div class="btn" id="btn34">34</div>
                    <div class="btn" id="btn35">35</div>
                    <div class="btn" id="btn36">36</div>
                    <div class="btn" id="btn37">37</div>
                    
                </div>
            </div>
            <div class="loto right">

            </div>
        </article>
        
    </section>
    
    <footer>
        <section class="left">
            <article class="startbtn" id="start">
                <h5>START</h5>
            </article>
            <a href="https://foxlvr1024.itch.io/">
                <article class="taskicon">
                    <img src="../pics/itchio.png" alt="t" class="icon" style="height: 20px;">
                </article>
            </a>
            <a href="https://x.com/foxlvr1024">
                <article class="taskicon">
                    <img src="../pics/Logo_of_Twitter.png" alt="t" class="icon">
                </article>
            </a>
            <a href="https://bsky.app/profile/foxlvr1024.bsky.social">
                <article class="taskicon">
                    <img src="../pics/Bluesky_Logo.png" alt="t" class="icon">
                </article>
            </a>
            <a href="https://github.com/foxlvr1024">
                <article class="taskicon">
                    <img src="../pics/github-logo.png" alt="t" class="icon">
                </article>
            </a>
        </section>
        <section class="right">
            
            <p id="clock"></p>
            
        </section>
    </footer>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/loto.js"></script>
</body>
</html>
