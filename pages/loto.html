    <link rel="stylesheet" href="../styles.css">

<body>
    
    <header>
        <section class="left">
            <h5>My Computer</h5>
        </section>
        <section class="right">
            <div class="btns">
                <img src="../pics/minimize.png" class="btns" id="minimize">

            </div>

            </div>
