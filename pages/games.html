<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foxlvr1024</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" type="image/x-icon" href="../pics/My Computer.ico">

    
</head>
<body>
    
    <header>
        <section class="left">
            <h5>My Computer</h5>
        </section>
        <section class="right">
            <div class="btns">
                <img src="../pics/minimize.png" class="btns" id="minimize">
            </div>
            <div class="btns">
                <img src="../pics/maximise.png" class="btns" id="maximise">
            </div>
            <div class="btns right">
                <img src="../pics/close.png" class="btns" id="close">
            </div>
        </section>
    </header>
    
    <section class="main">
        <article class="banner">
            <div class="file" id="home">
                <p class="file">Home</p>
            </div>
            <div class="file" id="myprojects">
                <p class="file">MyProjects</p>
            </div>
            <div class="file" id="devlogs">
                <p class="file">Devlogs</p>
            </div>
            <div class="file" id="reviews">
                <p class="file">Reviews</p>
            </div>
            <div class="file" id="games">
                <p class="file">Games</p>
            </div>
        </article>

        <article class="middle">
            <div class="navigation">
                <article class="nav">
                    <div class="nav top">
                        <p class="nav top">Newest game</p>
                    </div>
                    <div class="nav content">
                        <div class="fileline">
                            <img src="../pics/loto.png" class="file">
                            <p class="nav content">Lottery</p>
                        </div>
                    </div>
                </article>
        
            </div>
            <div class="content">
                <div class="cont title">
                    <p class="con title">Lottery</p>
                </div>
                <div class="cont conte" id="loto">
                    <div class="cont lef">
                        <img src="../pics/loto.png" class="big">
                    </div>
                    <div class="cont righ">
                        <p class="con conte">Select your 7 lucky numbers and see how much money you will win.</p>
                    </div>
                </div>


                <div class="cont title">
                    <p class="con title">Chance button</p>
                </div>
                <div class="cont conte" id="flipcoin">
                    <div class="cont lef">
                        <img src="../pics/flipcoin_icon.png" class="big">
                    </div>
                    <div class="cont righ">
                        <p class="con conte">Click the button to get points, but the chances of losing all of your points increase with more points you have.</p>
                    </div>
                </div>
                
            </div>
        </article>
        
    </section>
    
    <footer>
        <section class="left">
            <article class="startbtn" id="start">
                <h5>START</h5>
            </article>
            <a href="https://foxlvr1024.itch.io/">
                <article class="taskicon">
                    <img src="../pics/itchio.png" alt="t" class="icon" style="height: 20px;">
                </article>
            </a>
            <a href="https://x.com/foxlvr1024">
                <article class="taskicon">
                    <img src="../pics/Logo_of_Twitter.png" alt="t" class="icon">
                </article>
            </a>
            <a href="https://bsky.app/profile/foxlvr1024.bsky.social">
                <article class="taskicon">
                    <img src="../pics/Bluesky_Logo.png" alt="t" class="icon">
                </article>
            </a>
            <a href="https://github.com/foxlvr1024">
                <article class="taskicon">
                    <img src="../pics/github-logo.png" alt="t" class="icon">
                </article>
            </a>
        </section>
        <section class="right">
            
            <p id="clock"></p>
            
        </section>
    </footer>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/games.js"></script>
</body>
</html>
